{% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>👤 Customers</h2>
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCustomerModal">
    + Add Customer
  </button>
</div>

<table class="table table-bordered table-hover shadow-sm">
  <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Created Date</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for c in customers %}
    <tr>
      <td>{{ c.customer_id }}</td>
      <td>{{ c.name }}</td>
      <td>{{ c.email }}</td>
      <td>{{ c.created_date }}</td>
      <td>
        <button class="btn btn-sm btn-warning"
          data-bs-toggle="modal"
          data-bs-target="#editCustomerModal{{ c.customer_id }}">
          Edit
        </button>
        <a href="/customers/delete/{{ c.customer_id }}"
           class="btn btn-sm btn-danger"
           onclick="return confirm('Delete this customer?')">
          Delete
        </a>
      </td>
    </tr>

    <!-- Edit Modal -->
    <div class="modal fade" id="editCustomerModal{{ c.customer_id }}" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit Customer</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form action="/customers/edit/{{ c.customer_id }}" method="POST">
            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control"
                       value="{{ c.name }}" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control"
                       value="{{ c.email }}" required>
              </div>
            </div>
            <div class="modal-footer">
              <button type="submit" class="btn btn-success">Save Changes</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    {% else %}
    <tr><td colspan="5" class="text-center text-muted">No customers yet.</td></tr>
    {% endfor %}
  </tbody>
</table>

<!-- Add Customer Modal -->
<div class="modal fade" id="addCustomerModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add New Customer</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form action="/customers/add" method="POST">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control"
                   placeholder="Full name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control"
                   placeholder="email@example.com" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">Add Customer</button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
